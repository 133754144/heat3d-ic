<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Heat3D-IC V3 RIGNO steady thermal operator flowchart</title>
  <desc id="desc">Publication-oriented vector flowchart showing train-only normalization, physical-to-regional graph construction, RIGNO encoder, processor, decoder, temperature recovery, validation checkpoint selection, and V3 audit findings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FAFC"/>
      <stop offset="1" stop-color="#EEF4F7"/>
    </linearGradient>
    <linearGradient id="input" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E5F4F1"/>
      <stop offset="1" stop-color="#D2ECE7"/>
    </linearGradient>
    <linearGradient id="graph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E5ECFA"/>
      <stop offset="1" stop-color="#D8E1F3"/>
    </linearGradient>
    <linearGradient id="model" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9E5FA"/>
      <stop offset="1" stop-color="#DED7F2"/>
    </linearGradient>
    <linearGradient id="train" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF2DA"/>
      <stop offset="1" stop-color="#FCE4B9"/>
    </linearGradient>
    <linearGradient id="audit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF0F0"/>
      <stop offset="1" stop-color="#F8DADA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#15324B" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#35546D"/>
    </marker>
    <marker id="arrow-light" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#8A5A3B"/>
    </marker>
    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #15324B; letter-spacing: 0.2px; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 400; fill: #557086; }
      .section { font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #35546D; letter-spacing: 1.6px; }
      .box-title { font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #15324B; }
      .box-body { font-family: Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #29475E; }
      .small { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #557086; }
      .audit-title { font-family: Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700; fill: #743C38; }
      .audit-body { font-family: Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #633D3A; }
      .flow { fill: none; stroke: #35546D; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .branch { fill: none; stroke: #8A5A3B; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 8 7; marker-end: url(#arrow-light); }
      .outline { stroke: #B7C9D4; stroke-width: 1.5; }
      .pill { font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #35546D; letter-spacing: 0.6px; }
    </style>
  </defs>

  <rect width="1600" height="1040" fill="url(#bg)"/>
  <rect x="48" y="38" width="1504" height="964" rx="28" fill="#FFFFFF" opacity="0.92" filter="url(#shadow)"/>

  <text x="96" y="92" class="title">Heat3D-IC V3 · RIGNO steady thermal operator</text>
  <text x="96" y="122" class="subtitle">From heterogeneous material/source/BC fields to a steady 3D temperature-rise field · controlled V3 path</text>
  <text x="1394" y="91" class="pill" text-anchor="end">MODEL FLOW / AUDIT</text>
  <line x1="96" y1="151" x2="1504" y2="151" stroke="#D8E4EA" stroke-width="2"/>

  <text x="96" y="184" class="section">01 · PHYSICAL SAMPLE</text>
  <text x="434" y="184" class="section">02 · TRAIN-ONLY REPRESENTATION</text>
  <text x="824" y="184" class="section">03 · MULTISCALE RIGNO</text>
  <text x="1205" y="184" class="section">04 · RECOVERY &amp; SELECTION</text>

  <!-- Input -->
  <g filter="url(#shadow)">
    <rect x="96" y="218" width="270" height="198" rx="18" fill="url(#input)" class="outline"/>
    <text x="122" y="253" class="box-title">Steady heat sample</text>
    <text x="122" y="286" class="box-body">coords x ∈ R³</text>
    <text x="122" y="310" class="box-body">k = (kₓ, kᵧ, k_z), diag3</text>
    <text x="122" y="334" class="box-body">localized source q(x)</text>
    <text x="122" y="358" class="box-body">relative BC features</text>
    <text x="122" y="390" class="small">target: ΔT = T − T_ref</text>
  </g>

  <!-- Normalize -->
  <g filter="url(#shadow)">
    <rect x="424" y="218" width="310" height="198" rx="18" fill="url(#graph)" class="outline"/>
    <text x="450" y="253" class="box-title">Train-only normalization</text>
    <text x="450" y="286" class="box-body">condition: z-score from train</text>
    <text x="450" y="310" class="box-body">coordinates: normalized unit box</text>
    <text x="450" y="334" class="box-body">target: (ΔT − μtrain) / σtrain</text>
    <text x="450" y="365" class="box-body">zero-Δu bridge</text>
    <text x="450" y="396" class="small">no valid/test statistics enter fit</text>
  </g>

  <!-- Graph -->
  <g filter="url(#shadow)">
    <rect x="424" y="466" width="310" height="214" rx="18" fill="url(#graph)" class="outline"/>
    <text x="450" y="501" class="box-title">Heat3D graph builder</text>
    <text x="450" y="534" class="box-body">physical nodes p + regional nodes r</text>
    <text x="450" y="558" class="box-body">p2r · r2r · r2p edge sets</text>
    <text x="450" y="582" class="box-body">discrete physical coverage radius</text>
    <text x="450" y="606" class="box-body">min physical coverage ≥ 1</text>
    <text x="450" y="643" class="small">graph hash / edge counts recorded</text>
  </g>

  <!-- RIGNO blocks -->
  <g filter="url(#shadow)">
    <rect x="824" y="218" width="300" height="174" rx="18" fill="url(#model)" class="outline"/>
    <text x="850" y="253" class="box-title">Encoder · p2r</text>
    <text x="850" y="286" class="box-body">physical features + x</text>
    <text x="850" y="310" class="box-body">message passing / segment_mean</text>
    <text x="850" y="345" class="box-body">latent pnodes, latent rnodes</text>
    <text x="850" y="374" class="small">node/edge latent width = 96</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="824" y="430" width="300" height="174" rx="18" fill="url(#model)" class="outline"/>
    <text x="850" y="465" class="box-title">Processor · r2r</text>
    <text x="850" y="498" class="box-body">regional message passing</text>
    <text x="850" y="522" class="box-body">6 update steps · MLP depth 2</text>
    <text x="850" y="557" class="box-body">updated regional latent</text>
    <text x="850" y="586" class="small">fixed steady one-step operator</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="824" y="642" width="300" height="174" rx="18" fill="url(#model)" class="outline"/>
    <text x="850" y="677" class="box-title">Decoder · r2p</text>
    <text x="850" y="710" class="box-body">updated rnodes + latent pnodes</text>
    <text x="850" y="734" class="box-body">regional → physical aggregation</text>
    <text x="850" y="769" class="box-body">ŷ_norm(x): normalized ΔT</text>
    <text x="850" y="798" class="small">mixed regional / physical path</text>
  </g>

  <!-- Recovery -->
  <g filter="url(#shadow)">
    <rect x="1205" y="218" width="268" height="198" rx="18" fill="url(#input)" class="outline"/>
    <text x="1231" y="253" class="box-title">Temperature recovery</text>
    <text x="1231" y="290" class="box-body">inverse train normalization</text>
    <text x="1231" y="325" class="box-body">ΔT_hat = σŷ + μ</text>
    <text x="1231" y="359" class="box-body">T_hat = T_ref + ΔT_hat</text>
    <text x="1231" y="393" class="small">raw field for reporting</text>
  </g>

  <!-- Training / selection -->
  <g filter="url(#shadow)">
    <rect x="1205" y="466" width="268" height="214" rx="18" fill="url(#train)" class="outline"/>
    <text x="1231" y="501" class="box-title">Training objective</text>
    <text x="1231" y="534" class="box-body">plain MSE in normalized ΔT</text>
    <text x="1231" y="565" class="box-body">AdamW · B88 sample_shuffle</text>
    <text x="1231" y="596" class="box-body">warmup + cosine (V3 default)</text>
    <text x="1231" y="627" class="box-body">valid_base_mse checkpoint</text>
    <text x="1231" y="657" class="small">best + final + predictions</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1205" y="730" width="268" height="178" rx="18" fill="url(#train)" class="outline"/>
    <text x="1231" y="765" class="box-title">Evaluation package</text>
    <text x="1231" y="798" class="box-body">raw RMSE / MAE / max error</text>
    <text x="1231" y="824" class="box-body">relative + shape diagnostics</text>
    <text x="1231" y="850" class="box-body">hotspot / strong-q / stress</text>
    <text x="1231" y="881" class="small">split, seed, graph hash, epoch</text>
  </g>

  <!-- Main flow -->
  <path d="M366 317 L424 317" class="flow"/>
  <path d="M579 416 L579 466" class="flow"/>
  <path d="M734 562 L780 562 L780 305 L824 305" class="flow"/>
  <path d="M974 392 L974 430" class="flow"/>
  <path d="M974 604 L974 642" class="flow"/>
  <path d="M1124 729 L1164 729 L1164 317 L1205 317" class="flow"/>
  <path d="M1339 416 L1339 466" class="flow"/>
  <path d="M1339 680 L1339 730" class="flow"/>

  <!-- Train feedback -->
  <path d="M1205 571 L1168 571 L1168 960 L770 960 L770 562 L734 562" class="branch"/>
  <text x="856" y="986" class="small" fill="#8A5A3B">gradient update / next batch</text>

  <!-- Audit callout -->
  <g filter="url(#shadow)">
    <rect x="96" y="730" width="638" height="178" rx="18" fill="url(#audit)" class="outline"/>
    <text x="122" y="766" class="audit-title">V3 audit boundary · evidence, not an extra model block</text>
    <text x="122" y="800" class="audit-body">graph coverage is a correctness precondition; old radius can leave zero support</text>
    <text x="122" y="826" class="audit-body">optimizer/lr changes one-sample relative RMSE from ~68% to ~9% (Adam 1e−3)</text>
    <text x="122" y="852" class="audit-body">seed/path-scale instability remains; public main has no PDE/interface/BC residual</text>
    <text x="122" y="883" class="small">do not interpret normalized valid_base_mse as true relative RMS</text>
  </g>

  <!-- Legend -->
  <line x1="1010" y1="950" x2="1048" y2="950" class="flow"/>
  <text x="1060" y="955" class="small">solid: model/data flow</text>
  <line x1="1190" y1="950" x2="1228" y2="950" class="branch"/>
  <text x="1240" y="955" class="small">dashed: training feedback / audit context</text>
  <text x="1504" y="986" class="small" text-anchor="end">source commit 11e9d2f · V3 controlled path</text>
</svg>
