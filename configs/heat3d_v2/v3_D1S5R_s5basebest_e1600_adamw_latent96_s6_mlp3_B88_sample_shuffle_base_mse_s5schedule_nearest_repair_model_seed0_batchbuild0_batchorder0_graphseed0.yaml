schema_version: heat3d_v2_config_draft_v0
config_role: controlled
description: Heat3D v3 D1-S5R decoder-capacity config; S5 schedule from S5 best checkpoint.
non_claims:
- diagnostic
- research_stage
- not_formal_benchmark
- not_model_performance_evidence
- not_publication_ready_result
dataset:
  name: medium1024_gapA_full1024_v2
  subset_path: data/heat3d-thermal-simulation/subsets/v1_multilayer_bc_eq_physics_label_medium1024_gapA_full1024_v2
  manifest_path: configs/heat3d_v1_physics_label_medium1024_gapA_manifest.json
  split_map_path: configs/heat3d_v2/medium1024_gapA_stratified_split_seed0.json
  k_encoding_mode: diag3
  target: normalized_deltaT
  recovery: T_ref_plus_deltaT
  feature_view: relative_bc_features
  bridge: zero_delta_u_bridge
  split_source: split_map
  sample_limit: null
  debug_only: false
model:
  architecture: RIGNO
  num_outputs: 1
  node_latent_size: 96
  edge_latent_size: 96
  processor_steps: 6
  mlp_hidden_layers: 3
  concatenate_tau: false
  concatenate_t: false
  conditioned_normalization: false
  cond_norm_hidden_size: 16
  p_edge_masking: 0.0
  report_parameter_count: false
  report_memory_estimate: false
optimizer:
  name: adamw
  lr: 0.0005
  lr_schedule: warmup_cosine
  warmup_epochs: 10
  min_lr: 5.0e-05
  second_stage_epoch: null
  second_stage_lr: null
  weight_decay: 0.0001
  gradient_clip_norm: 1.0
  seed: 0
  multi_seed: []
  model_seed: 0
  batch_order_seed: 0
  graph_seed: 0
loss:
  mode: mse
  base_space: normalized_deltaT
  background_quantile: 0.5
  hotspot_quantile: 0.9
  strong_q_quantile: 0.9
  background_weight: 0.0
  hotspot_weight: 0.0
  strong_q_weight: 0.0
  background_l1_weight: 0.0
  background_bias_weight: 0.0
  background_over_weight: 0.0
  background_relative_weight: 0.0
  relative_floor: 0.02
  relative_floor_mode: fixed
  pseudo_negative_quantile: 0.25
  pseudo_negative_delta_threshold: null
  pseudo_negative_weight: 0.0
  pseudo_negative_over_margin: 0.0
  pseudo_negative_min_count: 1
  pseudo_negative_loss_type: relative_l1
  pseudo_negative_relative_floor: 0.02
  weight_schedule: constant
  transition_epoch: 0
  draft_peak_loss_weight: null
  draft_field_shape_loss_weight: null
run:
  mode: controlled
  epochs: 1600
  batching: mini_batch
  batch_size: 88
  micro_batch_size: null
  validation_batch_size: 88
  prediction_batch_size: 88
  shuffle_train_batches: true
  drop_last: false
  report_every: 5
  train_metrics_schedule: half_and_final
  grad_norm_report_every: 10
  log_mode: compact
  progress_log: true
  progress_detail: basic
  device_policy: ssh_required_for_training
  allow_long_training_local: false
  batch_plan: sample_shuffle
  batch_build_seed: 0
  init_checkpoint: output/heat3d_v2_runs/latent96_s6_mlp2_B88_sample_shuffle_nearest_repair_S5_seed0_e1600_warmupcosine_lr5e-4_minlr5e-5_wd1e-4/params_best.pkl
  checkpoint_load_strict: false
  partial_load_policy: matching
  final_probe_eval_after_training: true
  final_probe_checkpoint_kind: both
  final_probe_output_dir: output/heat3d_v3_final_probe_D1S5R
  post_training_diagnostics: true
  post_training_diagnostics_output_dir: output/heat3d_v3_decoder_s5schedule_audit/D1S5R
  sample_weight_policy: none
  sample_weight_json: null
  sample_weight_default: 1.0
  sample_weight_normalize: false
graph:
  radius_policy: legacy_kdtree_mean4
  coverage_repair_policy: nearest_rnode
  repair_p2r: true
  repair_r2p: true
  min_physical_coverage: 1
export:
  output_dir: output/heat3d_v2_runs/latent96_s6_mlp3_B88_sample_shuffle_nearest_repair_D1S5R_S5basebest_mse_e1600_s5schedule_wd1e-4
  run_name: latent96_s6_mlp3_B88_sample_shuffle_nearest_repair_D1S5R_S5basebest_mse_e1600_s5schedule_wd1e-4
  save_final_predictions: true
  final_predictions_name: predictions.npz
  save_best_predictions: true
  best_predictions_name: best_predictions.npz
  selection_metric: valid_base_mse
  save_run_config: true
  save_loss_summary: true
diagnostics:
  prediction_labels:
  - final
  - best
  run_baseline_comparison: true
  run_error_bins: true
  run_condition_diagnostics: true
  run_summary: true
  top_k: 5
  deltaT_bins: p50,p75,p90,p95
  q_power_bins: p33,p66
  metric_set:
  - mean_T_rmse
  - mean_T_mae
  - mean_DeltaT_rmse
  - mean_max_abs
  - mean_p95_abs
  - mean_peak_T_err
  - mean_hotspot_dist
  field_shape_metrics:
  - field_variance_ratio
  - centered_spatial_correlation
  - amplitude_ratio
  - peak_abs_error
  - top_k_overlap
  p_quantiles:
  - 0.95
  - 0.99
baseline_reference:
  path: configs/heat3d_v2/frozen_v1_reference.yaml
  compare_against: frozen_v1_best_diagnostic
metadata:
  training_batch_plan: v3_decoder_capacity_s5_schedule_e1600
  priority: P3_decoder_capacity_s5_schedule_long_preparation
  capacity_label: latent96-s6-mlp3
  graph_policy_label: nearest_repair
  purpose: 'D1-S5R: S5 best checkpoint + MSE + latent96_s6_mlp3 e1600 using S5 warmup-cosine schedule.'
  risk_note: High-risk diagnostic config only; not a formal benchmark and not publication-ready evidence.
  determinism_note: runner records deterministic audit hashes in loss_summary.json.
  batch_policy_label: B88_sample_shuffle
  model_seed: 0
  batch_build_seed: 0
  batch_order_seed: 0
  graph_seed: 0
  graph_policy_note: nearest_repair graph policy retained from S5.
  non_claims: Config only; not a completed training result.
  variant_label: D1-S5R
  checkpoint_source: S5 base best
  checkpoint_source_path: output/heat3d_v2_runs/latent96_s6_mlp2_B88_sample_shuffle_nearest_repair_S5_seed0_e1600_warmupcosine_lr5e-4_minlr5e-5_wd1e-4/params_best.pkl
  s5_schedule_source: configs/heat3d_v2/frozen_v1_e1600_adamw_latent96_s6_mlp2_B88_sample_shuffle_base_mse_warmup_cosine_lr5e-4_minlr5e-5_nearest_repair_model_seed0_batchbuild0_batchorder0_graphseed0.yaml
  p_edge_masking: 0.0
  finetune_group: S5_checkpoint_decoder_capacity_s5_schedule
  lr_schedule: warmup_cosine
  lr: 0.0005
  warmup_epochs: 10
  min_lr: 5.0e-05
  loss_mode: mse
  hotspot_quantile: 0.9
  hotspot_weight: 0.0
  strong_q_quantile: 0.9
  strong_q_weight: 0.0
  test_type: decoder_capacity_s5_schedule_long
  expected_risk: high
  smoke_source: v3_decoder_capacity_mlp3_smoke_e002 passed; D1-L400 failed under weaker lr schedule
  epochs: 1600
  selection_metric: valid_base_mse
  final_probe_eval_after_training: true
  post_training_diagnostics: true
  save_predictions: true
  partial_load_policy: matching
  checkpoint_load_strict: false
  run_condition: Retraining-style long schedule from S5 checkpoint; uses S5 schedule and full export/diagnostics.
