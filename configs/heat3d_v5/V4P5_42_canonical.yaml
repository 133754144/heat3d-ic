schema_version: heat3d_v2_config_draft_v0
config_role: controlled
description: >-
  Canonical clean Heat3D training profile derived from frozen V42. It retains
  the V38 model/data/optimizer contract and applies only V42's fixed
  point-global raw objective and train-only scale-squared weighting. Runtime
  output locations are intentionally not part of this scientific profile.

dataset:
  name: heat3d_v4_p5_clean_nohard_v0
  subset_path: data/heat3d_v4_p5_clean_nohard_v0
  manifest_path: data/heat3d_v4_p5_clean_nohard_v0/manifest.json
  split_source: split_map
  split_map_path: configs/heat3d_v4/candidate1024_p5_clean_nohard_train672_valid128_test128_hardchallenge_seed0.json
  sample_limit: null
  debug_only: false
  k_encoding_mode: diag3
  feature_view: relative_bc_features
  bridge: zero_delta_u_bridge
  target: normalized_deltaT
  recovery: T_ref_plus_deltaT
  normalization_profile: semantic_normalization_v1
  condition_feature_transform: semantic_v1_logk_signedlog1p_q_binary_bcflags_independent_bc_scalars
  input_feature_schema: legacy_bc_flags
  coord_policy: sample_local_isotropic
  extent_feature_policy: log_extent_broadcast

model:
  architecture: RIGNO
  num_outputs: 1
  node_latent_size: 96
  edge_latent_size: 96
  processor_steps: 6
  mlp_hidden_layers: 2
  concatenate_t: false
  concatenate_tau: false
  conditioned_normalization: false
  cond_norm_hidden_size: 16
  decoder_bypass_mode: post_decoder_residual
  decoder_bypass_features: explicit_local_condition
  decoder_bypass_feature_source: normalized_c
  decoder_bypass_local_feature_names:
    - k_x
    - k_y
    - k_z
    - q
    - is_top
    - is_bottom
    - is_side
    - is_interior
  decoder_bypass_output_space: native_psi
  decoder_bypass_hidden_size: 64
  decoder_bypass_layers: 2
  decoder_bypass_init: zero_residual
  decoder_bypass_residual_scale: 0.5
  global_context_mode: film
  global_context_feature_dim: 24
  global_context_feature_names:
    - log_s_phys_K
    - P_operator_W
    - log_P_operator_W
    - q_weighted_local_kz_W_mK
    - q_weighted_inverse_kz_mK_W
    - q_low_k_overlap_fraction
    - source_concentration
    - source_z_centroid_normalized
    - source_layer_kz_heterogeneity_cv
    - harmonic_kx_W_mK
    - harmonic_ky_W_mK
    - harmonic_kz_W_mK
    - anisotropy_xy_over_z
    - log_Lx_m
    - log_Ly_m
    - log_Lz_m
    - log_top_area_m2
    - log_top_h_W_m2K
    - T_bottom_K
    - T_inf_K
    - T_inf_minus_T_bottom_K
    - bc_top_cv_fraction
    - bc_bottom_cv_fraction
    - bc_side_cv_fraction
  film_target: rnodes_processed
  film_init: identity
  film_hidden_size: 64
  native_output_mode: native_shape_scale
  native_branch_mode: joint
  shape_scale_epsilon: 1.0e-12
  scale_head_mode: physics_plus_pooled_latent
  scale_head_hidden_size: 64
  scale_head_init: identity
  scale_pooling: mean
  pooled_latent_stop_gradient: false
  shape_attention_mode: none
  scale_attention_mode: physics_gate
  qk_region_feature_version: sparse_safe_v2
  scale_context_mode: none
  scale_deepsets_mode: none
  p_edge_masking: 0.05
  edge_masking_scope: r2r_only
  report_memory_estimate: false
  report_parameter_count: false

graph:
  node_coordinate_encoding: raw
  node_coordinate_freqs: 4
  radius_policy: discrete_physical_coverage
  coverage_repair_policy: none
  repair_p2r: true
  repair_r2p: true
  min_physical_coverage: 1

optimizer:
  name: adamw
  lr: 5.0e-4
  weight_decay: 1.0e-4
  gradient_clip_norm: 1.0
  lr_schedule: warmup_cosine
  warmup_epochs: 10
  min_lr: 5.0e-5
  lr_init: 1.0e-5
  lr_peak: 2.0e-4
  lr_base: 1.0e-5
  lr_lowr: 1.0e-6
  pct_start: 0.02
  pct_final: 0.1
  second_stage_epoch: 0
  second_stage_lr: 1.0e-4
  seed: 0
  model_seed: 0
  batch_order_seed: 0
  graph_seed: 0
  multi_seed: []

loss:
  mode: mse
  base_space: normalized_deltaT
  native_shape_cv_weight: 1.5
  native_log_scale_weight: 0.5
  native_relative_field_weight: 1.0
  native_raw_field_weight: 1.0
  native_raw_loss_mode: point_global_fixed_train_energy_sse
  native_log_scale_weight_mode: train_true_scale_squared_clipped
  native_log_scale_weight_clip_min: 0.25
  native_log_scale_weight_clip_max: 4.0
  background_quantile: 0.5
  hotspot_quantile: 0.9
  background_weight: 0.0
  hotspot_weight: 0.0
  strong_q_quantile: 0.9
  strong_q_weight: 0.0
  background_l1_weight: 0.0
  background_bias_weight: 0.0
  background_over_weight: 0.0
  background_relative_weight: 0.0
  relative_floor_mode: fixed
  relative_floor: 0.02
  pseudo_negative_weight: 0.0
  pseudo_negative_quantile: 0.25
  pseudo_negative_loss_type: relative_l1
  pseudo_negative_over_margin: 0.0
  pseudo_negative_min_count: 1
  pseudo_negative_relative_floor: 0.02
  pseudo_negative_delta_threshold: null
  weight_schedule: constant
  transition_epoch: 0
  draft_field_shape_loss_weight: null
  draft_peak_loss_weight: null

run:
  mode: controlled
  epochs: 600
  batching: mini_batch
  batch_size: 28
  micro_batch_size: null
  validation_batch_size: 32
  prediction_batch_size: 32
  batch_plan: sample_shuffle
  batch_build_seed: 0
  shuffle_train_batches: true
  epoch_wise_batch_regrouping: true
  drop_last: false
  init_mode: real_first_batch
  init_checkpoint: null
  checkpoint_load_strict: null
  partial_load_policy: null
  allow_long_training_local: false
  progress_log: true
  progress_detail: basic
  report_every: 5
  grad_norm_report_every: 10
  log_mode: compact
  train_metrics_schedule: half_and_final
  sample_weight_policy: none
  sample_weight_default: 1.0
  sample_weight_normalize: false
  post_training_diagnostics: true
  final_probe_eval_after_training: false
  final_probe_checkpoint_kind: both

export:
  prediction_split: valid_iid
  selection_metric: valid_rel_rmse_v4_pct
  save_point_global_best_checkpoint: true
  point_global_best_checkpoint_name: params_best_valid_point_global.pkl
  save_sample_first_best_checkpoint: true
  sample_first_best_checkpoint_name: params_best_valid_sample_first.pkl
  save_base_mse_best_checkpoint: true
  base_mse_best_checkpoint_name: params_best_valid_base_mse.pkl
  save_best_predictions: true
  best_predictions_name: best_predictions.npz
  save_final_predictions: true
  final_predictions_name: predictions.npz
  save_loss_summary: true
  save_run_config: true

diagnostics:
  metric_set:
    - mean_T_rmse
    - mean_T_mae
    - mean_DeltaT_rmse
    - mean_max_abs
    - mean_p95_abs
    - mean_peak_T_err
    - mean_hotspot_dist
  p_quantiles: [0.95, 0.99]
  deltaT_bins: p50,p75,p90,p95
  q_power_bins: p33,p66
  field_shape_metrics:
    - field_variance_ratio
    - centered_spatial_correlation
    - amplitude_ratio
    - peak_abs_error
    - top_k_overlap
  top_k: 5
  prediction_labels: [final, best]
  run_summary: true
  run_error_bins: true
  run_condition_diagnostics: true
  run_field_shape_diagnostics: true
  run_baseline_comparison: true

baseline_reference:
  path: configs/heat3d_v2/frozen_v1_reference.yaml
  compare_against: frozen_v1_best_diagnostic

metadata:
  profile_id: V4P5_42_canonical
  source_contract: V4P5_42_gate6q_objective_only_e600
  model_data_baseline: V4P5_38_gate6n_v36_r2r_mask_p005_e600
  initialization: random
  fit_roles: [train]
  normalization_fit_roles: [train]
  selection_roles: [valid_iid]
  report_only_roles:
    - test_iid
    - hard_train_holdout
    - hard_challenge_valid
    - hard_challenge_test
  sealed_iid_access: forbidden
  primary_checkpoint_selection: valid_point_global_true_rms
  legacy_checkpoint_selection: valid_base_mse
  scientific_conclusion_source: v5-final-threshold-unmet
