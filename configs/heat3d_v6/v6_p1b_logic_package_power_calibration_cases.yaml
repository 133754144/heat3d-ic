    - {id: silicon_die_upper, thickness_m: 0.00015, material: silicon_bulk, property_class: bulk, k_W_mK: 120.0, role: active, z_intervals: 4, evidence: [L03, L20, L21]}
    - {id: tim_to_spreader, thickness_m: 0.00005, material: tim_effective, property_class: effective, k_W_mK: 4.0, role: interface, z_intervals: 4, evidence: [L03, L20]}
    - {id: spreader, thickness_m: 0.001, material: copper_bulk, property_class: bulk, k_W_mK: 400.0, role: passive, z_intervals: 16, evidence: [L03]}
  solver_mesh_intervals_xyz: [64, 64, 32]
  source_min_control_volume_count: 256
  source_min_in_plane_intervals: 8
  boundary_conditions:
    top: {type: robin, h_W_m2K: 500.0, T_inf_K: 300.0}
    bottom: {type: dirichlet, T_K: 300.0}
    sides: {type: adiabatic}
  contact: {type: perfect, R_contact_m2K_W: 0.0}
  operator_projection:
    point_count: 1024
    point_seed_stage: before_temperature_solve
    strata: {volume: 512, source: 256, interface: 128, top: 64, bottom: 64}
power_contract:
  package_total_power_W: [0.5, 1.0, 2.0, 4.0]
  provenance: explicit_user_instruction
  allocation_mode: proportional_to_declared_source_planform_area
  topology_total_declared_source_area_m2: 0.000064
  source_power_formula: package_total_power_W * source_area_m2 / topology_total_source_area_m2
  surface_power_density_formula: source_power_W / source_area_m2
  q_formula: source_power_W / realized_source_control_volume_m3
  direct_package_power_to_local_small_source_forbidden: true
