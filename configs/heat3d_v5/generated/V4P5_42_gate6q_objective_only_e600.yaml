  export:
    output_dir: output/heat3d_v5_gate6q_runs/V4P5_42_gate6q_objective_only_e600
    run_name: V4P5_42_gate6q_objective_only_e600
    prediction_split: valid_iid
  metadata:
    phase: v5_gate6q_training_prep
    candidate: V42_objective_only
    baseline_config_id: V4P5_38_gate6n_v36_r2r_mask_p005_e600
    initialization: random
    fit_roles: [train]
