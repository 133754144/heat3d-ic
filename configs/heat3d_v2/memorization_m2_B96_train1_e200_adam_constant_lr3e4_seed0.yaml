schema_version: heat3d_v2_config_draft_v0
config_role: controlled
description: One-sample optimizer audit using Adam with constant lr=3e-4 and no weight decay.
dataset: &dataset
  name: medium1024_gapA_memorization_train1_adam_constant_lr3e4_seed0
  subset_path: data/heat3d-thermal-simulation/subsets/v1_multilayer_bc_eq_physics_label_medium1024_gapA_full1024_v2
  split_map_path: configs/heat3d_v2/medium1024_gapA_memorization_train1_seed0.json
  boundary_mask_fallback: true
  k_encoding_mode: diag3
  target: normalized_deltaT
  recovery: T_ref_plus_deltaT
  feature_view: relative_bc_features
  bridge: zero_delta_u_bridge
model: &model
  architecture: RIGNO
  node_latent_size: 128
  edge_latent_size: 128
  processor_steps: 6
  mlp_hidden_layers: 2
optimizer:
  name: adam
  lr: 0.0003
  lr_schedule: constant
  warmup_epochs: 0
  min_lr: 0.0003
  weight_decay: 0.0
  gradient_clip_norm: null
  seed: 0
loss: &loss
  mode: mse
run: &run
  mode: controlled
  epochs: 200
  batch_size: 96
  validation_batch_size: 96
  prediction_batch_size: 96
  shuffle_train_batches: false
  drop_last: false
  report_every: 5
  train_metrics_schedule: every_epoch
  grad_norm_report_every: 10
  log_mode: compact
  progress_log: true
  progress_detail: basic
  device_policy: ssh_required_for_training
  allow_long_training_local: false
export:
  output_dir: output/heat3d_v2_runs/memorization_m2_B96_train1_e200_adam_constant_lr3e4_seed0
  run_name: memorization_m2_B96_train1_e200_adam_constant_lr3e4_seed0
  save_final_predictions: false
  save_best_predictions: false
  best_predictions_name: best_predictions.npz
  selection_metric: valid_loss
diagnostics: &diagnostics
  prediction_labels: []
  run_baseline_comparison: false
  run_error_bins: false
  run_condition_diagnostics: false
  run_summary: false
