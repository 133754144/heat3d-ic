  export:
    output_dir: output/heat3d_v5_gate6r_runs/V4P5_46_gate6r_objective_deepsets_e600
    run_name: V4P5_46_gate6r_objective_deepsets_e600
    prediction_split: valid_iid
  metadata:
    phase: v5_gate6r_training_prep
    candidate: V46_objective_deepsets
    baseline_config_id: V4P5_45_gate6r_deepsets_only_e600
    initialization: random
    objective_source: V4P5_42_gate6q_objective_only_e600
    fit_roles: [train]
    normalization_fit_roles: [train]
    objective_reference_fit_roles: [train]
    selection_roles: [valid_iid]
    forbidden_access_roles: [test_iid, hard_train_holdout, hard_challenge_valid, hard_challenge_test, sealed_iid]
    launch_policy: explicit_user_instruction_only
