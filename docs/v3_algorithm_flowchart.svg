<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc">
  <title id="title">Heat3D-IC V3 RIGNO architecture</title>
  <desc id="desc">A compact publication-style schematic of the V3 Heat3D RIGNO path: input fields, physical and regional nodes, encoder p2r edges, six regional processor steps, decoder r2p edges, and predicted temperature rise.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBFCFE"/><stop offset="1" stop-color="#F1F5F8"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BBD4F4"/><stop offset="1" stop-color="#9DBDEB"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8D9F2"/><stop offset="1" stop-color="#C8AEE0"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF3CF"/><stop offset="1" stop-color="#FFE5A1"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#183F82"/><stop offset="0.5" stop-color="#F2F3F4"/><stop offset="1" stop-color="#B52322"/>
    </linearGradient>
    <pattern id="pnodePattern" width="38" height="26" patternUnits="userSpaceOnUse" patternTransform="skewX(-28)">
      <ellipse cx="13" cy="12" rx="9" ry="5.5" fill="#61C878" stroke="#247A47" stroke-width="1.5"/>
    </pattern>
    <pattern id="rnodePattern" width="54" height="34" patternUnits="userSpaceOnUse" patternTransform="skewX(-28)">
      <circle cx="19" cy="16" r="7" fill="#8D7CE5" stroke="#483F9A" stroke-width="1.5"/>
    </pattern>
    <pattern id="speckleBlue" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#EFF4FA"/>
      <circle cx="3" cy="5" r="2" fill="#34588D"/><circle cx="12" cy="13" r="2.2" fill="#9CB4D1"/>
      <circle cx="15" cy="3" r="1.2" fill="#5C7EAA"/><circle cx="6" cy="16" r="1.3" fill="#6C8DB7"/>
    </pattern>
    <pattern id="speckleGreen" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="#EAF5F1"/>
      <circle cx="3" cy="4" r="2.1" fill="#328A67"/><circle cx="12" cy="13" r="2.4" fill="#7BC9A0"/>
      <circle cx="15" cy="3" r="1.4" fill="#CFA149"/><circle cx="6" cy="16" r="1.2" fill="#3D9A72"/>
    </pattern>
    <pattern id="speckleHeat" width="22" height="18" patternUnits="userSpaceOnUse">
      <rect width="22" height="18" fill="#F5F5F5"/>
      <circle cx="4" cy="4" r="2.5" fill="#2C5694"/><circle cx="15" cy="13" r="2.5" fill="#B53E38"/>
      <circle cx="19" cy="3" r="1.5" fill="#E69D52"/><circle cx="7" cy="15" r="1.6" fill="#7390BF"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#173B59" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#172330"/>
    </marker>
    <marker id="orangeArrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#E58D29"/>
    </marker>
    <marker id="purpleArrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#85539A"/>
    </marker>
    <marker id="redArrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#B6262C"/>
    </marker>
    <style>
      text { font-family: Georgia, 'Times New Roman', serif; fill: #172330; }
      .title { font-size: 28px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .minor { font-size: 14px; }
      .tiny { font-size: 12px; }
      .bar { fill: url(#blue); stroke: #172330; stroke-width: 3; }
      .bartext { font-size: 20px; font-weight: 700; }
      .blackline { fill: none; stroke: #172330; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .orange { fill: none; stroke: #E58D29; stroke-width: 3.5; stroke-linecap: round; marker-end: url(#orangeArrow); opacity: .94; }
      .purple { fill: none; stroke: #85539A; stroke-width: 2.4; stroke-linecap: round; marker-end: url(#purpleArrow); opacity: .9; }
      .red { fill: none; stroke: #B6262C; stroke-width: 3.5; stroke-linecap: round; marker-end: url(#redArrow); opacity: .95; }
      .dashed { fill: none; stroke: #172330; stroke-width: 2.5; stroke-dasharray: 9 8; }
      .card { stroke: #172330; stroke-width: 2.5; }
    </style>
  </defs>

  <rect width="1600" height="940" fill="url(#paper)"/>
  <rect x="35" y="30" width="1530" height="880" rx="26" fill="#FFFFFF" stroke="#CFDCE6" stroke-width="2" filter="url(#shadow)"/>

  <text x="78" y="82" class="title">Heat3D-IC V3 · RIGNO</text>
  <text x="78" y="108" class="minor">steady thermal operator</text>
  <text x="1515" y="82" class="minor" text-anchor="end">ΔT = T − T_ref</text>

  <!-- input thumbnails -->
  <g class="card">
    <rect x="78" y="145" width="130" height="126" rx="2" fill="url(#speckleBlue)"/>
    <rect x="235" y="145" width="130" height="126" rx="2" fill="url(#speckleHeat)"/>
    <rect x="392" y="145" width="130" height="126" rx="2" fill="url(#speckleGreen)"/>
    <rect x="549" y="145" width="130" height="126" rx="2" fill="url(#heat)"/>
    <rect x="78" y="145" width="38" height="34" fill="#FFFFFF"/>
    <rect x="235" y="145" width="38" height="34" fill="#FFFFFF"/>
    <rect x="392" y="145" width="38" height="34" fill="#FFFFFF"/>
    <rect x="549" y="145" width="38" height="34" fill="#FFFFFF"/>
    <text x="97" y="169" class="label">x</text>
    <text x="254" y="169" class="label">k</text>
    <text x="411" y="169" class="label">q</text>
    <text x="568" y="169" class="label">BC</text>
  </g>
  <path d="M143 271 L143 300 L386 300 L386 321" class="blackline"/>
  <path d="M300 271 L300 300" class="blackline"/>
  <path d="M457 271 L457 300" class="blackline"/>
  <path d="M614 271 L614 300 L386 300" fill="none" stroke="#172330" stroke-width="4" stroke-linecap="round"/>

  <!-- embedding -->
  <rect x="80" y="321" width="612" height="55" rx="13" class="bar"/>
  <text x="386" y="356" text-anchor="middle" class="bartext">Input embedding</text>
  <rect x="631" y="329" width="48" height="39" rx="7" fill="url(#yellow)" stroke="#172330" stroke-width="2.2"/>
  <text x="655" y="355" text-anchor="middle" class="label">FF</text>
  <path d="M386 376 L386 420" class="blackline"/>

  <!-- physical input mesh -->
  <polygon points="82,542 622,542 762,452 222,452" fill="url(#pnodePattern)" stroke="#172330" stroke-width="2.4"/>
  <ellipse cx="308" cy="492" rx="71" ry="27" fill="#E4A13F" fill-opacity=".27" stroke="#D78325" stroke-width="2"/>
  <ellipse cx="330" cy="493" rx="14" ry="8" fill="#E9A134" stroke="#8C5217" stroke-width="2"/>
  <ellipse cx="358" cy="487" rx="14" ry="8" fill="#E9A134" stroke="#8C5217" stroke-width="2"/>
  <text x="82" y="570" class="minor">physical nodes</text>

  <!-- encoder p2r edges -->
  <path d="M292 509 L276 731" class="orange"/>
  <path d="M316 507 L320 731" class="orange"/>
  <path d="M340 502 L366 731" class="orange"/>
  <path d="M364 497 L412 731" class="orange"/>
  <path d="M384 490 L458 731" class="orange"/>

  <!-- regional input mesh -->
  <polygon points="110,827 618,827 748,746 240,746" fill="url(#purple)" stroke="#172330" stroke-width="2.4"/>
  <g stroke="#85539A" stroke-width="1.7" fill="none" opacity=".86">
    <path d="M160 794 L250 759 L334 806 L430 759 L522 804 L632 759"/>
    <path d="M120 823 L218 779 L310 823 L402 778 L501 821 L595 778 L700 814"/>
    <path d="M248 759 L218 779 M334 806 L310 823 M430 759 L402 778 M522 804 L501 821 M632 759 L595 778"/>
  </g>
  <g fill="#8D7CE5" stroke="#483F9A" stroke-width="2">
    <circle cx="160" cy="794" r="7"/><circle cx="250" cy="759" r="7"/><circle cx="334" cy="806" r="7"/><circle cx="430" cy="759" r="7"/><circle cx="522" cy="804" r="7"/><circle cx="632" cy="759" r="7"/>
    <circle cx="120" cy="823" r="7"/><circle cx="218" cy="779" r="7"/><circle cx="310" cy="823" r="7"/><circle cx="402" cy="778" r="7"/><circle cx="501" cy="821" r="7"/><circle cx="595" cy="778" r="7"/><circle cx="700" cy="814" r="7"/>
  </g>
  <text x="110" y="858" class="minor">regional nodes</text>

  <!-- processor lane -->
  <path d="M748 786 L820 786" class="blackline"/>
  <rect x="820" y="704" width="282" height="150" rx="18" fill="#F5E5F5" stroke="#172330" stroke-width="2.5" stroke-dasharray="9 8"/>
  <text x="961" y="731" text-anchor="middle" class="label">Processor ×6</text>
  <g stroke="#85539A" stroke-width="1.6" fill="none">
    <path d="M844 765 L876 745 L907 766 L939 745 L970 766"/><path d="M844 817 L876 797 L907 817 L939 797 L970 817"/>
  </g>
  <g fill="#8D7CE5" stroke="#483F9A" stroke-width="1.5">
    <circle cx="844" cy="765" r="5"/><circle cx="876" cy="745" r="5"/><circle cx="907" cy="766" r="5"/><circle cx="939" cy="745" r="5"/><circle cx="970" cy="766" r="5"/>
    <circle cx="844" cy="817" r="5"/><circle cx="876" cy="797" r="5"/><circle cx="907" cy="817" r="5"/><circle cx="939" cy="797" r="5"/><circle cx="970" cy="817" r="5"/>
  </g>
  <rect x="1000" y="748" width="42" height="30" rx="6" fill="url(#yellow)" stroke="#172330" stroke-width="2"/><text x="1021" y="770" class="minor" text-anchor="middle">FF</text>
  <text x="1060" y="780" class="label">···</text>
  <path d="M1102 786 L1170 786" class="blackline"/>

  <!-- feed-forward inset -->
  <rect x="776" y="155" width="270" height="230" rx="18" fill="url(#yellow)" stroke="#172330" stroke-width="2.5" stroke-dasharray="9 8"/>
  <text x="911" y="184" text-anchor="middle" class="label">Feed-forward</text>
  <rect x="840" y="207" width="142" height="37" rx="9" fill="#FFE29A" stroke="#172330" stroke-width="2.2"/><text x="911" y="232" text-anchor="middle" class="label">MLP</text>
  <path d="M911 244 L911 258" class="blackline"/>
  <rect x="840" y="258" width="142" height="37" rx="9" fill="#FFE29A" stroke="#172330" stroke-width="2.2"/><text x="911" y="283" text-anchor="middle" class="label">LN</text>
  <path d="M911 295 L911 310" class="blackline"/>
  <rect x="840" y="310" width="142" height="37" rx="9" fill="#FFE29A" stroke="#172330" stroke-width="2.2"/><text x="911" y="335" text-anchor="middle" class="label">+</text>
  <path d="M911 385 L911 704" class="dashed"/>

  <!-- decoder regional mesh -->
  <polygon points="962,827 1470,827 1590,746 1082,746" fill="url(#purple)" stroke="#172330" stroke-width="2.4"/>
  <g stroke="#85539A" stroke-width="1.7" fill="none" opacity=".86">
    <path d="M1012 794 L1102 759 L1186 806 L1282 759 L1374 804 L1484 759"/>
    <path d="M972 823 L1070 779 L1162 823 L1254 778 L1353 821 L1447 778 L1552 814"/>
    <path d="M1102 759 L1070 779 M1186 806 L1162 823 M1282 759 L1254 778 M1374 804 L1353 821 M1484 759 L1447 778"/>
  </g>
  <g fill="#8D7CE5" stroke="#483F9A" stroke-width="2">
    <circle cx="1012" cy="794" r="7"/><circle cx="1102" cy="759" r="7"/><circle cx="1186" cy="806" r="7"/><circle cx="1282" cy="759" r="7"/><circle cx="1374" cy="804" r="7"/><circle cx="1484" cy="759" r="7"/>
    <circle cx="972" cy="823" r="7"/><circle cx="1070" cy="779" r="7"/><circle cx="1162" cy="823" r="7"/><circle cx="1254" cy="778" r="7"/><circle cx="1353" cy="821" r="7"/><circle cx="1447" cy="778" r="7"/><circle cx="1552" cy="814" r="7"/>
  </g>

  <!-- decoder r2p edges -->
  <path d="M1148 764 L1120 514" class="red"/>
  <path d="M1181 774 L1170 507" class="red"/>
  <path d="M1214 780 L1220 499" class="red"/>
  <path d="M1248 774 L1270 490" class="red"/>
  <path d="M1280 766 L1320 482" class="red"/>

  <!-- output physical mesh -->
  <polygon points="930,542 1470,542 1600,452 1060,452" fill="url(#pnodePattern)" stroke="#172330" stroke-width="2.4"/>
  <ellipse cx="1284" cy="493" rx="86" ry="30" fill="#E85A4F" fill-opacity=".24" stroke="#C33633" stroke-width="2"/>
  <ellipse cx="1272" cy="492" rx="15" ry="8" fill="#E64D46" stroke="#8E2928" stroke-width="2"/>
  <ellipse cx="1306" cy="487" rx="15" ry="8" fill="#E64D46" stroke="#8E2928" stroke-width="2"/>
  <ellipse cx="1338" cy="493" rx="15" ry="8" fill="#E64D46" stroke="#8E2928" stroke-width="2"/>
  <text x="930" y="570" class="minor">predicted physical field</text>

  <!-- output -->
  <path d="M1265 452 L1265 409" class="blackline"/>
  <rect x="946" y="321" width="603" height="55" rx="13" class="bar"/>
  <text x="1248" y="356" text-anchor="middle" class="bartext">Output projection</text>
  <rect x="1476" y="329" width="54" height="39" rx="7" fill="url(#yellow)" stroke="#172330" stroke-width="2.2"/>
  <text x="1503" y="355" text-anchor="middle" class="label">ΔT̂</text>
  <path d="M1248 321 L1248 292" class="blackline"/>
  <rect x="1132" y="200" width="238" height="60" rx="12" fill="#FFFFFF" stroke="#172330" stroke-width="2.2"/>
  <text x="1251" y="227" text-anchor="middle" class="label">T̂ = T_ref + ΔT̂</text>
  <text x="1251" y="248" text-anchor="middle" class="tiny">inverse train normalization</text>

  <!-- legend -->
  <g>
    <rect x="1152" y="96" width="360" height="88" rx="14" fill="#FFFFFF" stroke="#BFCBD5" stroke-width="2"/>
    <ellipse cx="1181" cy="120" rx="12" ry="7" fill="#61C878" stroke="#247A47" stroke-width="1.5"/><text x="1206" y="125" class="minor">physical node</text>
    <circle cx="1181" cy="145" r="7" fill="#8D7CE5" stroke="#483F9A" stroke-width="1.5"/><text x="1206" y="150" class="minor">regional node</text>
    <line x1="1320" y1="119" x2="1373" y2="119" stroke="#E58D29" stroke-width="3" marker-end="url(#orangeArrow)"/><text x="1385" y="125" class="minor">p2r</text>
    <line x1="1320" y1="145" x2="1373" y2="145" stroke="#85539A" stroke-width="2.4" marker-end="url(#purpleArrow)"/><text x="1385" y="150" class="minor">r2r</text>
    <line x1="1434" y1="119" x2="1487" y2="119" stroke="#B6262C" stroke-width="3" marker-end="url(#redArrow)"/><text x="1497" y="125" class="minor">r2p</text>
  </g>

  <text x="80" y="892" class="tiny">train-only normalization · physical/regional graph · AdamW + normalized-ΔT MSE</text>
  <text x="1515" y="892" text-anchor="end" class="tiny">V3 controlled path · source commit 11e9d2f</text>
</svg>
