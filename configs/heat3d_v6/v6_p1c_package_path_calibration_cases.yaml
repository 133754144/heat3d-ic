literature_evidence:
  package_equivalent_layers:
    title: Modeling, Analysis, Design, and Tests for Electronics Packaging beyond Moore
    chapter_url: https://www.sciencedirect.com/science/article/pii/B9780081025321000032
    table: 3.3.1-3.3.2
    frozen_values_note: >-
      The chapter models bump/underfill and routed package parts as anisotropic
      homogeneous blocks. P1c uses the listed under-interposer bump/underfill,
      Dv/P=0.1 silicon interposer, via-bearing BT substrate, and FR-4 PCB values.
  remote_boundary_support:
    title: Quasi-3D Thermal Simulation of Integrated Circuit Systems in Packages
    doi: 10.3390/en13123054
    url: https://doi.org/10.3390/en13123054
    note: A package stack is resolved before a constant-temperature or convective PCB exterior boundary.
