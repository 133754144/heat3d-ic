geometry_assignment_contract:
  version: p1g_balanced_joint_v1
  factors:
  - source_count
  - layout_kind
  - alignment_relation
  source_count_levels:
  - 3
  - 4
  - 5
  - 6
  - 7
  - 8
  - 9
  - 10
  layout_levels:
  - distributed
  - clustered
  - mixed
  - edge_balanced
  alignment_levels:
  - offset
  - partly_aligned
  assignment_method: explicit_balanced_joint_table_then_independent_role_seeded_shuffle
  factor_generation_from_split_ordinal: false
  global_factor_triplet_replicates: 2
  train_count_layout_replicates: 3
  same_factor_marginals_across_train_valid_test: true
  valid_test_count_layout_structural_note: 16 groups cannot make an 8x4 count-layout table independent; each count covers
    two layouts and valid/test use complementary minimum-association schedules
  parent_assignment_rows_reused_exactly: true
  alignment_geometry_definition:
    partly_aligned: paired upper/lower source centroids coincide
    offset: paired upper centroids translated exactly two solver-mesh intervals
    offset_magnitude_mm: 0.3125
    direction_selection: first collision-free direction in group-id-hash-rotated frozen candidate list
    label_or_temperature_inputs: []
