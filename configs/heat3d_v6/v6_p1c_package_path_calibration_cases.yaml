  - {id: tim_to_spreader, thickness_m: 0.00005, material: tim_effective, property_class: effective, k_W_mK: 4.0, role: interface, z_intervals: 4, evidence: [L03, L20]}
  - {id: spreader, thickness_m: 0.001, material: copper_bulk, property_class: bulk, k_W_mK: 400.0, role: passive, z_intervals: 16, evidence: [L03]}
paths:
  B_remote_dirichlet:
    description: Explicit package/board path below the lower die; 300 K only at the PCB exterior bottom.
    bottom: {type: dirichlet, T_K: 300.0, location: pcb_exterior_bottom}
    prepended_layers_bottom_to_top:
      - {id: pcb_fr4_equivalent, thickness_m: 0.0016, material: pcb_fr4_equivalent, property_class: effective, k_xyz_W_mK: [0.8, 0.8, 0.3], role: board, z_intervals: 8, evidence: package_equivalent_layers}
      - {id: bt_substrate_with_vias, thickness_m: 0.001, material: bt_substrate_with_vias, property_class: effective, k_xyz_W_mK: [0.2, 0.2, 0.49], role: substrate, z_intervals: 8, evidence: package_equivalent_layers}
      - {id: silicon_interposer_tsv_0p1, thickness_m: 0.0001, material: silicon_interposer_tsv_effective, property_class: effective, k_xyz_W_mK: [148.3, 148.3, 151.0], role: interposer, z_intervals: 4, evidence: package_equivalent_layers}
      - {id: bump_underfill_under_interposer, thickness_m: 0.000075, material: bump_underfill_effective, property_class: effective, k_xyz_W_mK: [0.6, 0.6, 4.9], role: interface, z_intervals: 4, evidence: package_equivalent_layers}
    solver_mesh_intervals_xyz: [64, 64, 56]
  C0_bottom_adiabatic:
    description: Frozen P1b stack with an adiabatic bottom and no board layer.
    bottom: {type: adiabatic, location: lower_die_exterior_bottom}
    prepended_layers_bottom_to_top: []
    solver_mesh_intervals_xyz: [64, 64, 32]
