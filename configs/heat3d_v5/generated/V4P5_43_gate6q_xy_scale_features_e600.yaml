schema_version: heat3d_v4_inherited_config_v0
config_id: V4P5_43_gate6q_xy_scale_features_e600
extends: V4P5_38_gate6n_v36_r2r_mask_p005_e600.yaml
overrides:
  description: >-
    Gate 6Q V43 random-init e600 candidate. Relative to V38, only the native
    global scale-head context gains ten train-standardized, raw-input-derived
    XY source/conductivity features. The features cannot enter shape, Global
    FiLM, or the decoder, and the V38 objective remains unchanged.
  model:
    scale_context_mode: xy_raw_global
    scale_context_feature_names:
      - q_weighted_kx
      - q_weighted_ky
      - q_weighted_inverse_kx
      - q_weighted_inverse_ky
      - source_x_centroid_normalized
      - source_y_centroid_normalized
      - source_x_spread_normalized
      - source_y_spread_normalized
      - q_low_kx_overlap
      - q_low_ky_overlap
  run:
    init_checkpoint: null
    final_probe_output_dir: output/heat3d_v5_gate6q_final_probe/V4P5_43_gate6q_xy_scale_features_e600
    post_training_diagnostics_output_dir: output/heat3d_v5_gate6q_diagnostics/V4P5_43_gate6q_xy_scale_features_e600
  export:
    output_dir: output/heat3d_v5_gate6q_runs/V4P5_43_gate6q_xy_scale_features_e600
    run_name: V4P5_43_gate6q_xy_scale_features_e600
    prediction_split: valid_iid
  metadata:
    phase: v5_gate6q_training_prep
    candidate: V43_xy_scale_features
    baseline_config_id: V4P5_38_gate6n_v36_r2r_mask_p005_e600
    initialization: random
    scale_context_consumers: [global_scale_head]
    scale_context_forbidden_consumers: [shape, film, decoder]
    fit_roles: [train]
    normalization_fit_roles: [train]
    scale_context_fit_roles: [train]
    selection_roles: [valid_iid]
    forbidden_access_roles: [test_iid, hard_train_holdout, hard_challenge_valid, hard_challenge_test, sealed_iid]
    launch_policy: explicit_user_instruction_only
    log_path: output/heat3d_v5_gate6q_logs/V4P5_43_gate6q_xy_scale_features_e600.log
    status: prepared_not_started
    training_started: false
    formal_e600_started: false
