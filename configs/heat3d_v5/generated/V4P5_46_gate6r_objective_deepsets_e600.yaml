config_id: V4P5_46_gate6r_objective_deepsets_e600
extends: V4P5_45_gate6r_deepsets_only_e600.yaml
overrides:
  description: >-
    Gate 6R V46 random-init e600 candidate. Relative to V45, only the two V42
    objective modes are enabled: point-global fixed train-energy raw SSE and
    train-only true-scale-squared clipped log-scale weighting. The V45
    source/volume-aware latent DeepSets path is unchanged and no XY scale
    context is added.
  loss:
    native_raw_loss_mode: point_global_fixed_train_energy_sse
    native_log_scale_weight_mode: train_true_scale_squared_clipped
    native_log_scale_weight_clip_min: 0.25
    native_log_scale_weight_clip_max: 4.0
  run:
    init_checkpoint: null
    final_probe_output_dir: output/heat3d_v5_gate6r_final_probe/V4P5_46_gate6r_objective_deepsets_e600
